{{define "login"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — event-spec</title>
  <link rel="icon" type="image/svg+xml" href="/ui/static/favicon.svg">
  <link rel="stylesheet" href="/ui/static/tabler.min.css">
  <script>
    (function(){var t=localStorage.getItem('es-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body class="es-login-body">
  <div class="es-login-card">
    <div class="es-login-header">
      <div style="display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:.5rem">
        <svg width="28" height="28" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <rect width="32" height="32" rx="7" fill="#1a2332"/>
          <path d="M20 4L11 17h6l-3 11 10-15h-6z" fill="#fff" fill-opacity=".95"/>
        </svg>
        <h1 class="es-login-title" style="margin:0">event-spec</h1>
      </div>
      <p class="es-login-subtitle">Admin UI</p>
    </div>
    {{if .Flash}}
    <div class="es-alert{{if .IsErr}} es-alert-danger{{else}} es-alert-success{{end}}">
      {{.Flash}}
    </div>
    {{end}}
    <form method="POST" action="/ui/login" class="es-login-form">
      <div class="es-form-group">
        <label class="es-label" for="api_key">API Key</label>
        <input
          id="api_key"
          name="api_key"
          type="password"
          class="es-input"
          placeholder="Paste your API key"
          autocomplete="current-password"
          required
          autofocus
        >
        <span class="es-form-hint">Any valid API key — your role determines which pages are accessible.</span>
      </div>
      <button type="submit" class="es-btn es-btn-primary es-btn-full">Sign in</button>
    </form>
  </div>
</body>
</html>
{{end}}

{{define "content"}}
<div class="es-toolbar es-flex es-flex-between" style="margin-bottom:1rem">
  <span></span>
  <a href="/ui/settings/destinations/new" class="es-btn es-btn-primary">+ Add Destination</a>
</div>

<div class="es-card">
  <div class="es-card-body es-p0">
    {{if .Destinations}}
    <table class="es-table" id="destinations-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Provider</th>
          <th>Config Keys</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {{range .Destinations}}
        <tr id="dest-row-{{.Name}}">
          <td>
            <a href="/ui/settings/destinations/{{.Name}}" class="es-link-strong">{{.Name}}</a>
          </td>
          <td><span class="es-tag">{{.Provider}}</span></td>
          <td class="es-text-muted es-text-sm">{{len .Config}}</td>
          <td style="text-align:right">
            <a href="/ui/settings/destinations/{{.Name}}" class="es-btn es-btn-ghost es-btn-sm">View</a>
            <a href="/ui/settings/destinations/{{.Name}}/edit" class="es-btn es-btn-ghost es-btn-sm">Edit</a>
            <button
              class="es-btn es-btn-danger es-btn-sm"
              hx-delete="/ui/settings/destinations/{{.Name}}"
              hx-target="#dest-row-{{.Name}}"
              hx-swap="outerHTML"
              hx-confirm="Delete destination {{.Name}}?"
            >Delete</button>
          </td>
        </tr>
        {{end}}
      </tbody>
    </table>
    {{else}}
    <div class="es-empty">
      <p>No destinations configured. <a href="/ui/settings/destinations/new">Add one</a>.</p>
    </div>
    {{end}}
  </div>
</div>
{{end}}

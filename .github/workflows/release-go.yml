name: Release — Go (module + CLI binaries)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Test, tag, build and release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race ./...

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Build CLI binaries for all platforms
        run: |
          mkdir -p dist
          declare -a PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${PLATFORMS[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            ARCHIVE="event-spec_v${{ inputs.version }}_${GOOS}_${GOARCH}"
            mkdir -p "dist/${ARCHIVE}"
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -ldflags="-s -w -X main.version=${{ inputs.version }}" \
              -o "dist/${ARCHIVE}/event-spec${EXT}" \
              ./cmd/event-spec
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip -q "${ARCHIVE}.zip" "${ARCHIVE}/event-spec${EXT}")
            else
              tar czf "dist/${ARCHIVE}.tar.gz" -C "dist/${ARCHIVE}" "event-spec${EXT}"
            fi
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "event-spec v${{ inputs.version }}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip

      - name: Stage Linux binaries for Docker
        run: |
          VERSION="${{ inputs.version }}"
          cp "dist/event-spec_v${VERSION}_linux_amd64/event-spec" docker/cli/event-spec-amd64
          cp "dist/event-spec_v${VERSION}_linux_arm64/event-spec" docker/cli/event-spec-arm64
          cp "dist/event-spec_v${VERSION}_linux_amd64/event-spec" docker/server/event-spec-amd64
          cp "dist/event-spec_v${VERSION}_linux_arm64/event-spec" docker/server/event-spec-arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CLI image
        uses: docker/build-push-action@v6
        with:
          context: docker/cli
          file: docker/cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dejanradmanovic/event-spec-cli:latest
            ghcr.io/dejanradmanovic/event-spec-cli:v${{ inputs.version }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: docker/server
          file: docker/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dejanradmanovic/event-spec-server:latest
            ghcr.io/dejanradmanovic/event-spec-server:v${{ inputs.version }}

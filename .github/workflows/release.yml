name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without leading v (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # ── Go: test, tag, CLI binaries, Docker images ───────────────────────────
  release-go:
    name: Go — test, tag, build, publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race ./...

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Build CLI binaries for all platforms
        run: |
          mkdir -p dist
          declare -a PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for platform in "${PLATFORMS[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            ARCHIVE="event-spec_v${{ inputs.version }}_${GOOS}_${GOARCH}"
            mkdir -p "dist/${ARCHIVE}"
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -ldflags="-s -w -X main.version=${{ inputs.version }}" \
              -o "dist/${ARCHIVE}/event-spec${EXT}" \
              ./cmd/event-spec
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip -q "${ARCHIVE}.zip" "${ARCHIVE}/event-spec${EXT}")
            else
              tar czf "dist/${ARCHIVE}.tar.gz" -C "dist/${ARCHIVE}" "event-spec${EXT}"
            fi
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip

      - name: Stage Linux binaries for Docker
        run: |
          VERSION="${{ inputs.version }}"
          cp "dist/event-spec_v${VERSION}_linux_amd64/event-spec" docker/cli/event-spec-amd64
          cp "dist/event-spec_v${VERSION}_linux_arm64/event-spec" docker/cli/event-spec-arm64
          cp "dist/event-spec_v${VERSION}_linux_amd64/event-spec" docker/server/event-spec-amd64
          cp "dist/event-spec_v${VERSION}_linux_arm64/event-spec" docker/server/event-spec-arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push CLI image
        uses: docker/build-push-action@v6
        with:
          context: docker/cli
          file: docker/cli/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dejanradmanovic/event-spec-cli:latest
            ghcr.io/dejanradmanovic/event-spec-cli:v${{ inputs.version }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: docker/server
          file: docker/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dejanradmanovic/event-spec-server:latest
            ghcr.io/dejanradmanovic/event-spec-server:v${{ inputs.version }}

  # ── TypeScript: api ───────────────────────────────────────────────────────
  release-ts-api:
    name: TypeScript — publish event-spec-api
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          package_json_file: sdk/typescript/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dejanradmanovic'
          cache: 'pnpm'
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: sdk/typescript
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-api typecheck

      - name: Lint
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-api lint

      - name: Test
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-api test

      - name: Build
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-api build

      - name: Set version
        working-directory: sdk/typescript/packages/api
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Publish
        working-directory: sdk/typescript/packages/api
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── TypeScript: provider-amplitude ───────────────────────────────────────
  release-ts-provider-amplitude:
    name: TypeScript — publish event-spec-provider-amplitude
    runs-on: ubuntu-latest
    needs: release-ts-api

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10
          package_json_file: sdk/typescript/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dejanradmanovic'
          cache: 'pnpm'
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: sdk/typescript
        run: pnpm install --frozen-lockfile

      - name: Type check
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-provider-amplitude typecheck

      - name: Lint
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-provider-amplitude lint

      - name: Test
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-provider-amplitude test

      - name: Build
        working-directory: sdk/typescript
        run: pnpm --filter @dejanradmanovic/event-spec-provider-amplitude build

      - name: Set version
        working-directory: sdk/typescript/packages/provider-amplitude
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Publish
        working-directory: sdk/typescript/packages/provider-amplitude
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Kotlin: api + provider-amplitude ─────────────────────────────────────
  release-kotlin:
    name: Kotlin — publish analytics-kotlin and analytics-kotlin-provider-amplitude
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Test
        working-directory: sdk/kotlin
        run: ./gradlew test

      - name: Publish
        working-directory: sdk/kotlin
        run: ./gradlew publish
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
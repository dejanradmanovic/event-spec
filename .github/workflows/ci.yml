name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        id: setup-go
        with:
          go-version-file: go.mod
          # Caches $GOPATH/pkg/mod (modules) and $GOCACHE (build cache),
          # keyed on go.sum. Restored automatically on subsequent runs.
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test (with race detector)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        id: setup-go
        with:
          go-version-file: go.mod
          # Caches modules + build cache. Restoring $GOCACHE makes
          # re-building golangci-lint from source very fast (link only).
          cache: true

      - name: Cache golangci-lint binary
        uses: actions/cache@v5
        with:
          path: ~/go/bin/golangci-lint
          # Invalidate when go.mod changes (new Go version or new deps
          # could require a fresh build of golangci-lint).
          key: golangci-lint-${{ runner.os }}-go${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.mod') }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall   # build with the project's Go version (avoids go1.24 vs go1.26 mismatch)
          args: --timeout=5m
pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: gofmt -w {staged_files} && git add {staged_files}
    vet:
      glob: "*.go"
      run: go vet ./...
    ts-check:
      glob: "sdk/typescript/**"
      root: "sdk/typescript/"
      run: pnpm format:check && pnpm typecheck && pnpm lint

pre-push:
  commands:
    tests:
      run: go test ./...
    lint:
      run: golangci-lint run --timeout=5m
    ts-tests:
      glob: "sdk/typescript/**"
      root: "sdk/typescript/"
      run: pnpm test
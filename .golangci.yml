version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - bodyclose
    - noctx
    - exhaustive
    - nilerr

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic

formatters:
  enable:
    - gofmt

issues:
  max-same-issues: 5
